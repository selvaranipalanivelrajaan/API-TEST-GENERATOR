openapi: "3.0.3"
info:
  title: "Bookstore API"
  description: |
    A sample bookstore REST API demonstrating a variety of OpenAPI features:
    - CRUD operations on Books and Authors
    - Authentication header
    - Path, query, and body parameters
    - Enum, numeric, and string constraints
    - Multiple response schemas
  version: "1.0.0"
  contact:
    name: "API Support"
    email: "support@bookstore.example.com"

servers:
  - url: "http://localhost:8000"
    description: "Local development server"

tags:
  - name: Books
    description: "Operations on book resources"
  - name: Authors
    description: "Operations on author resources"
  - name: Auth
    description: "Authentication endpoints"

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: "User login — returns a JWT token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "user@example.com"
              password: "s3cureP@ss!"
      responses:
        "200":
          description: "Login successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: "Invalid request body"
        "401":
          description: "Invalid credentials"

  # ── Books ─────────────────────────────────────────────────────────────────
  /books:
    get:
      tags: [Books]
      operationId: listBooks
      summary: "List all books with optional filters"
      parameters:
        - name: genre
          in: query
          required: false
          schema:
            type: string
            enum: [fiction, non-fiction, mystery, science, biography]
          description: "Filter by genre"
        - name: author_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: "Filter by author ID"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: "Page number for pagination"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: "Number of results per page"
      responses:
        "200":
          description: "List of books"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"
        "400":
          description: "Invalid query parameters"

    post:
      tags: [Books]
      operationId: createBook
      summary: "Create a new book"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
            example:
              title: "Clean Code"
              author_id: 1
              isbn: "978-0132350884"
              genre: "non-fiction"
              price: 34.99
              published_year: 2008
              in_stock: true
      responses:
        "201":
          description: "Book created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: "Validation error"
        "401":
          description: "Unauthorized"
        "422":
          description: "Unprocessable entity — schema mismatch"

  /books/{book_id}:
    get:
      tags: [Books]
      operationId: getBook
      summary: "Retrieve a single book by ID"
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: "Unique book identifier"
          example: 42
      responses:
        "200":
          description: "Book found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: "Book not found"

    put:
      tags: [Books]
      operationId: updateBook
      summary: "Replace a book record entirely"
      security:
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
      responses:
        "200":
          description: "Book updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: "Validation error"
        "401":
          description: "Unauthorized"
        "404":
          description: "Book not found"

    patch:
      tags: [Books]
      operationId: partialUpdateBook
      summary: "Partially update a book record"
      security:
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookPatch"
      responses:
        "200":
          description: "Book partially updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: "Validation error"
        "401":
          description: "Unauthorized"
        "404":
          description: "Book not found"

    delete:
      tags: [Books]
      operationId: deleteBook
      summary: "Delete a book by ID"
      security:
        - bearerAuth: []
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: "Book deleted — no content"
        "401":
          description: "Unauthorized"
        "404":
          description: "Book not found"

  # ── Authors ───────────────────────────────────────────────────────────────
  /authors:
    get:
      tags: [Authors]
      operationId: listAuthors
      summary: "List all authors"
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 2
            maxLength: 100
          description: "Search term to filter authors by name"
      responses:
        "200":
          description: "List of authors"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

    post:
      tags: [Authors]
      operationId: createAuthor
      summary: "Create a new author"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorCreate"
            example:
              name: "Robert C. Martin"
              bio: "Software engineer and author known for Clean Code."
              country: "US"
      responses:
        "201":
          description: "Author created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "400":
          description: "Validation error"
        "401":
          description: "Unauthorized"

  /authors/{author_id}:
    get:
      tags: [Authors]
      operationId: getAuthor
      summary: "Retrieve an author by ID"
      parameters:
        - name: author_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        "200":
          description: "Author found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: "Author not found"

    delete:
      tags: [Authors]
      operationId: deleteAuthor
      summary: "Delete an author by ID"
      security:
        - bearerAuth: []
      parameters:
        - name: author_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: "Author deleted"
        "401":
          description: "Unauthorized"
        "404":
          description: "Author not found"
        "409":
          description: "Conflict — author has existing books"

# ─────────────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          example: "s3cureP@ss!"

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          example: 3600

    Book:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 42
        title:
          type: string
          example: "Clean Code"
        author_id:
          type: integer
          example: 1
        isbn:
          type: string
          example: "978-0132350884"
        genre:
          type: string
          enum: [fiction, non-fiction, mystery, science, biography]
          example: "non-fiction"
        price:
          type: number
          format: float
          minimum: 0
          example: 34.99
        published_year:
          type: integer
          minimum: 1000
          maximum: 9999
          example: 2008
        in_stock:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          readOnly: true

    BookCreate:
      type: object
      required: [title, author_id, isbn, genre, price]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "Clean Code"
        author_id:
          type: integer
          minimum: 1
          example: 1
        isbn:
          type: string
          example: "978-0132350884"
        genre:
          type: string
          enum: [fiction, non-fiction, mystery, science, biography]
          example: "non-fiction"
        price:
          type: number
          format: float
          minimum: 0
          example: 34.99
        published_year:
          type: integer
          minimum: 1000
          maximum: 9999
          example: 2008
        in_stock:
          type: boolean
          default: true

    BookPatch:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        price:
          type: number
          format: float
          minimum: 0
        in_stock:
          type: boolean
        genre:
          type: string
          enum: [fiction, non-fiction, mystery, science, biography]

    BookList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Author:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "Robert C. Martin"
        bio:
          type: string
          example: "Author of Clean Code"
        country:
          type: string
          minLength: 2
          maxLength: 2
          example: "US"
        created_at:
          type: string
          format: date-time
          readOnly: true

    AuthorCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: "Robert C. Martin"
        bio:
          type: string
          maxLength: 2000
          example: "Software engineer and author."
        country:
          type: string
          minLength: 2
          maxLength: 2
          example: "US"
